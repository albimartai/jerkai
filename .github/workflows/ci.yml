# Lint, typecheck, unit tests, then integration tests against a disposable
# Neon branch (created off dev per run, migrated from an empty database,
# always torn down — see scripts/ci/neon-branch.mjs). CI never touches the
# persistent dev/prod Neon branches or the deployed app.
name: CI

# Run on PRs and on main. Scoping the push trigger to main (instead of
# every branch) keeps branch pushes to a single pull_request-triggered
# run, so required status checks attach to the PR and each push burns
# only one disposable Neon branch.
on:
  push:
    branches: [main]
  pull_request:

# One run per branch: a new push cancels the superseded run (and tears
# down its Neon branch via the always() cleanup step).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        # next-env.d.ts is gitignored; typegen recreates it (and route types)
        # without needing a full build or any runtime env vars.
        run: npx next typegen && npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Component tests
        run: npm run test:component

      - name: Create disposable Neon branch
        id: neon
        run: node scripts/ci/neon-branch.mjs create

      - name: Run migrations from an empty database
        run: npm run migrate:ci
        env:
          DATABASE_URL: ${{ steps.neon.outputs.database_url }}

      - name: Integration tests
        run: npm run test:integration
        env:
          DATABASE_URL: ${{ steps.neon.outputs.database_url }}

      - name: Tear down Neon branch
        # always(): failed runs must not leak branches (Neon free tier has a
        # branch cap, and leaked branches would accumulate one per push).
        if: always() && steps.neon.outputs.branch_id != ''
        run: node scripts/ci/neon-branch.mjs delete "${{ steps.neon.outputs.branch_id }}"
